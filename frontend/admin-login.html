<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MarketAtlas Admin Login</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:#1e293b;
    padding:30px;
    border-radius:16px;
    width:350px;
}

h2{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:none;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

#error{
    color:#ff6b6b;
    margin-top:10px;
}
</style>
</head>
<body>

<div class="card">
    <h2>Admin Login</h2>

    <input id="username" placeholder="Username">

    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <div id="error"></div>
</div>

<script>

async function login(){

    const response = await fetch(
        "https://marketatlas-api.onrender.com/api/admin/login",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                username:document.getElementById("username").value,
                password:document.getElementById("password").value
            })
        }
    );

    const data = await response.json();

    if(data.success){

        localStorage.setItem(
            "adminToken",
            data.token
        );

        window.location.href="dashboard.html";

    }else{
        document.getElementById("error").innerText =
        data.error;
    }
}

</script>

</body>
</html>
